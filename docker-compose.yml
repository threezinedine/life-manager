services:
  mysql:
    image: mysql:8
    env_file:
      - .prod.env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-life_manager}
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .prod.env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      - PORT=${SERVER_PORT}
      - SERVER_PORT=${SERVER_PORT}
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-life_manager}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${SERVER_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    env_file:
      - .prod.env
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    environment:
      - PORT=${CLIENT_PORT}
      - VITE_API_URL=http://localhost:${SERVER_PORT}

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        SERVER_PORT: ${SERVER_PORT}
        CLIENT_PORT: ${CLIENT_PORT}
    env_file:
      - .prod.env
    ports:
      - "80:80"
    depends_on:
      - server
      - client

  client-mobile:
    build:
      context: ./client-mobile
      dockerfile: Dockerfile
    env_file:
      - .prod.env
    ports:
      - "${CLIENT_MOBILE_PORT:-8081}:8081"
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:${SERVER_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
