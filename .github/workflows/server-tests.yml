name: Server Tests

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main, master]

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest

        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: server/package-lock.json

            # ── Database ──────────────────────────────────────────────────────────────
            - name: Start MySQL via docker-compose
              run: |
                  docker compose -f docker-compose.dev.yml up -d
                  docker compose -f docker-compose.dev.yml ps

            - name: Wait for MySQL to be healthy
              run: |
                  for i in $(seq 1 30); do
                    if docker compose -f docker-compose.dev.yml exec -T mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                      echo "MySQL is ready"
                      break
                    fi
                    echo "Waiting for MySQL... ($i/30)"
                    sleep 2
                  done

            # ── Server ────────────────────────────────────────────────────────────────
            - name: Install dependencies
              run: npm ci
              working-directory: .

            - name: Run migrations
              run: npm run migrate
              env:
                  DB_HOST: localhost
                  DB_PORT: 3306
                  DB_USER: root
                  DB_PASSWORD: rootpassword
                  DB_NAME: life_manager

            - name: Run unit tests
              run: npm run test
              working-directory: server
              env:
                  DB_HOST: localhost
                  DB_PORT: 3306
                  DB_USER: root
                  DB_PASSWORD: rootpassword
                  DB_NAME: life_manager

            - name: Upload test results on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: server-test-results-${{ github.run_number }}
                  path: |
                      server/coverage/
                      server/test-results/
                  retention-days: 7
